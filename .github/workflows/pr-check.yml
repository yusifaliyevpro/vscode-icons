name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Verify icon integrity
        run: node --no-warnings scripts/check-icons.ts

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Prettier check
        run: pnpm prettier --check "src/**/*.ts"

      - name: Build
        run: pnpm build

  version-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Check version not changed
        if: github.event.pull_request.user.login != 'yusifaliyevpro'
        run: |
          PR_VERSION=$(jq -r .version package.json)
          BASE_VERSION=$(jq -r .version base/package.json)

          if [ "$PR_VERSION" != "$BASE_VERSION" ]; then
            echo "::error::Version was changed from $BASE_VERSION to $PR_VERSION. Only the maintainer can change the version."
            exit 1
          fi

      - name: Changelog updated if version changed
        if: github.event.pull_request.user.login == 'yusifaliyevpro'
        run: |
          PR_VERSION=$(jq -r .version package.json)
          BASE_VERSION=$(jq -r .version base/package.json)

          if [ "$PR_VERSION" != "$BASE_VERSION" ]; then
            if ! diff -q CHANGELOG.md base/CHANGELOG.md > /dev/null 2>&1; then
              echo "Version changed and CHANGELOG.md updated."
            else
              echo "::error::Version was changed but CHANGELOG.md was not updated. Please add a changelog entry for v$PR_VERSION."
              exit 1
            fi
          else
            echo "Version not changed, skipping changelog check."
          fi

      - name: Validate changelog format if changed
        run: |
          if diff -q CHANGELOG.md base/CHANGELOG.md > /dev/null 2>&1; then
            echo "CHANGELOG.md not changed, skipping format check."
            exit 0
          fi

          echo "CHANGELOG.md changed, validating format..."

          ENTRY_COUNT=$(grep -c "^# v" CHANGELOG.md || true)
          if [ "$ENTRY_COUNT" -lt 1 ]; then
            echo "::error::CHANGELOG.md has no entries. At least one entry is required."
            exit 1
          fi

          INVALID=$(grep -n "^# [0-9]" CHANGELOG.md || true)
          if [ -n "$INVALID" ]; then
            echo "::error::CHANGELOG.md has version headings without 'v' prefix. All versions must be formatted as '# v1.0.8', not '# 1.0.8':"
            echo "$INVALID"
            exit 1
          fi

          FIRST_ENTRY=$(grep "^# v" CHANGELOG.md | head -1)
          CHANGELOG_VERSION=$(echo "$FIRST_ENTRY" | sed 's/^# v//' | tr -d '[:space:]')
          PKG_VERSION=$(jq -r .version package.json)

          if [ "$CHANGELOG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Top CHANGELOG.md entry (v$CHANGELOG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

          echo "CHANGELOG.md format is valid ($ENTRY_COUNT entries found)."
