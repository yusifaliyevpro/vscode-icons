name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Verify icon integrity
        run: node --no-warnings scripts/check-icons.ts

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Oxfmt check
        run: pnpm fmt:check

      - name: Build
        run: pnpm build

  version-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Check version not changed
        if: github.event.pull_request.user.login != 'yusifaliyevpro'
        run: |
          PR_VERSION=$(jq -r .version package.json)
          BASE_VERSION=$(jq -r .version base/package.json)

          if [ "$PR_VERSION" != "$BASE_VERSION" ]; then
            echo "::error::Version was changed from $BASE_VERSION to $PR_VERSION. Only the maintainer can change the version."
            exit 1
          fi
