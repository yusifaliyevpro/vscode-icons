name: Deploy VSCode Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Install vsce
        run: pnpm add -g @vscode/vsce

      - name: Install ovsx
        run: pnpm add -g ovsx

      - name: Build extension
        run: pnpm build

      - name: Check the version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Current version: $CURRENT_VERSION"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          LATEST_VERSION=${LATEST_TAG#v}

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; 
          then
            echo "Version changed"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy extension
        if: steps.check.outputs.version_changed == 'true'
        run: |
          vsce package
          vsce publish -p $VSCE_TOKEN
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX
        if: steps.check.outputs.version_changed == 'true'
        run: ovsx publish -p $OVSX_TOKEN
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Extract changelog for this version
        if: steps.check.outputs.version_changed == 'true'
        run: node --no-warnings scripts/extract-changelog.ts "${{ steps.check.outputs.new_version }}" > /tmp/release-notes.md

      - name: Create git tag
        if: steps.check.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.check.outputs.new_version }}
          git push origin v${{ steps.check.outputs.new_version }}

      - name: Create GitHub release
        if: steps.check.outputs.version_changed == 'true'
        run: |
          gh release create "v${{ steps.check.outputs.new_version }}" \
            --title "v${{ steps.check.outputs.new_version }}" \
            --notes-file /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip publish
        if: steps.check.outputs.version_changed == 'false'
        run: echo "Version ${{ steps.check.outputs.new_version }} is already published. Skipping."
