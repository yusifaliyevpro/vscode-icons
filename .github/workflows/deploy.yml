name: Deploy Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm build

      - name: Check the version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Current version: $CURRENT_VERSION"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          LATEST_VERSION=${LATEST_TAG#v}

          echo "previous_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ];
          then
            echo "Version changed"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy extension
        if: steps.check.outputs.version_changed == 'true'
        run: |
          pnpx @vscode/vsce package
          pnpx @vscode/vsce publish -p $VSCE_TOKEN
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX
        if: steps.check.outputs.version_changed == 'true'
        run: pnpx ovsx publish -p $OVSX_TOKEN
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Create git tag
        if: steps.check.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.check.outputs.new_version }}
          git push origin v${{ steps.check.outputs.new_version }}

      - name: Create GitHub release
        if: steps.check.outputs.version_changed == 'true'
        run: |
          gh release create "v${{ steps.check.outputs.new_version }}" \
            --title "v${{ steps.check.outputs.new_version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on released PRs
        if: steps.check.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.new_version }}
          PREVIOUS_TAG: ${{ steps.check.outputs.previous_tag }}
        run: |
          # PR numbers referenced in squash-merge commit subjects since the last release
          if git rev-parse "$PREVIOUS_TAG" >/dev/null 2>&1; then
            RANGE="${PREVIOUS_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          PRS=$(git log "$RANGE" --pretty=%s | grep -oE '\(#[0-9]+\)' | grep -oE '[0-9]+' | sort -un)
          echo "PRs in this release: ${PRS:-none}"

          for PR in $PRS; do
            # Skip anything that isn't a merged PR (e.g. an issue number reference)
            STATE=$(gh pr view "$PR" --json state --jq '.state' 2>/dev/null || echo "")
            if [ "$STATE" != "MERGED" ]; then
              echo "Skipping #$PR (state: ${STATE:-not a PR})"
              continue
            fi

            AUTHOR=$(gh pr view "$PR" --json author --jq '.author.login')
            echo "Commenting on #$PR (@$AUTHOR)"

            gh pr comment "$PR" --body "$(cat <<EOF
          @${AUTHOR} Thanks for the PR! Released in [**v${VERSION}**](https://github.com/yusifaliyevpro/vscode-icons/releases/tag/v${VERSION})! 🎉

          It's available on Open VSX right now. VS Code Marketplace verification can take about 10 minutes, and the VS Code app may take up to 2 hours to auto-update.

          After the verification, to get it immediately, open the Extensions view, search for "Icons - Maintained", and update manually.
          EOF
          )"
          done
